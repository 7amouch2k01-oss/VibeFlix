<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MosMa - Premium Movie Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --bg-secondary: rgba(20, 20, 20, 0.8);
            --card-bg: rgba(25, 25, 25, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #ff0000;
            --accent-hover: #cc0000;
            --glow-color: rgba(255, 0, 0, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-speed: 0.3s;
            --header-height: 80px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Animated Background Gradient */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 10%, rgba(255, 0, 0, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(255, 0, 0, 0.03) 0%, transparent 40%);
            pointer-events: none;
        }

        /* Header Styles */
        header {
            height: var(--header-height);
            padding: 0 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-group {
            display: flex;
            flex-direction: column;
        }

        #main-title {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff0000, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
        }

        .subtitle {
            font-size: 0.65rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Hero Section */
        .hero-section {
            position: relative;
            height: 85vh;
            display: flex;
            align-items: center;
            padding: 0 5%;
            overflow: hidden;
        }

        .hero-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center 20%;
            z-index: 1;
            transition: transform 1.5s ease-out;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-color) 5%, transparent 60%),
                        linear-gradient(to right, var(--bg-color) 0%, transparent 70%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 700px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 900;
            margin-bottom: 15px;
            line-height: 1;
            letter-spacing: -2px;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .hero-rating-value {
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hero-overview {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 35px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--glow-color);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Controls Section */
        .controls-wrapper {
            position: sticky;
            top: var(--header-height);
            z-index: 900;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            border-bottom: 1px solid var(--glass-border);
        }

        .controls-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
        }

        .search-container {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        #movie-search {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 12px 20px 12px 45px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        #movie-search:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .genre-filter {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px 5%;
            scrollbar-width: none;
            max-width: 1400px;
            margin: 0 auto;
        }

        .genre-filter::-webkit-scrollbar { display: none; }

        .genre-btn {
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .genre-btn:hover, .genre-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* Movie Grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            padding: 20px 5% 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .poster-container {
            aspect-ratio: 2/3;
            position: relative;
            overflow: hidden;
        }

        .poster-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .movie-card:hover .poster-container img {
            transform: scale(1.1);
        }

        .rating-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 800;
            color: #ffd700;
            backdrop-filter: blur(5px);
            z-index: 5;
        }

        .movie-info {
            padding: 15px;
        }

        .movie-card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-card-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Smooth scroll for iOS */
        }

        .modal-content {
            background: #0a0a0a;
            max-width: 1100px;
            margin: 20px auto; /* Add margin for better scroll breathing room */
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            position: relative;
            animation: modalSlideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        @keyframes modalSlideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .modal-close:hover {
            background: var(--accent-color);
            transform: rotate(90deg);
        }

        /* Responsive Fixes */
        @media (max-width: 768px) {
            .controls-container { flex-direction: column; align-items: stretch; }
            .hero-title { font-size: 2.8rem; }
            .hero-overview { -webkit-line-clamp: 2; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
            header { height: 70px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <header>
        <div class="logo-group" onclick="window.location.reload()">
            <h1 id="main-title">MosMa</h1>
            <span class="subtitle">Premium Cinema Experience</span>
        </div>
        
        <div class="header-actions">
            <button id="watchlist-btn" class="btn btn-secondary">
                <span>Watchlist</span>
                <span class="watchlist-count" style="background: var(--accent-color); padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; margin-left: 5px;">0</span>
            </button>
        </div>
    </header>

    <main>
        <section class="hero-section" id="hero-section">
            <div class="hero-backdrop" id="hero-backdrop"></div>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h2 class="hero-title" id="hero-title">Discover</h2>
                <div class="hero-meta">
                    <span class="hero-rating-value">★ <span id="hero-rating">0.0</span></span>
                    <span id="hero-year">2024</span>
                </div>
                <p class="hero-overview" id="hero-overview">Explore the world of premium cinema with MosMa.</p>
                <div class="btn-group">
                    <button class="btn btn-primary" id="hero-trailer-btn">▶ Watch Trailer</button>
                    <button class="btn btn-secondary" id="hero-watchlist-btn">+ Watchlist</button>
                </div>
            </div>
        </section>

        <div class="controls-wrapper">
            <div class="controls-container">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="movie-search" placeholder="Search movies, actors, directors..." aria-label="Search movies">
                </div>
                
                <div class="sort-group">
                    <select id="sort-select" class="genre-btn" style="background: rgba(255,255,255,0.05);">
                        <option value="popularity">Most Popular</option>
                        <option value="rating">Top Rated</option>
                        <option value="release-date">Newest</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="genre-filter" id="genre-filter">
            <button class="genre-btn active" data-genre="all">All Genres</button>
        </div>

        <div id="error-message" style="display:none; text-align:center; padding: 40px; color: var(--accent-color); font-weight: 700;"></div>

        <div class="movie-grid" id="movie-display-area">
            <!-- Movie cards injected here -->
        </div>

        <div id="loading-spinner" style="display:none; text-align:center; padding: 40px;">
            <div style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;"></div>
        </div>

        <div id="empty-state" style="display:none; text-align:center; padding: 100px 20px;">
            <h2 style="font-size: 2rem; margin-bottom: 10px;">No results found</h2>
            <p style="color: var(--text-secondary);">Try searching for something else or adjusting your filters.</p>
        </div>
    </main>

    <div class="modal" id="movie-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div id="modal-details-content"></div>
        </div>
    </div>

    <div class="watchlist-container" id="watchlist-container" style="display:none; padding: 40px 5%; max-width: 1400px; margin: 0 auto;">
        <h2 style="margin-bottom: 30px; font-size: 2.5rem; font-weight: 900; letter-spacing: -1px;">My Watchlist</h2>
        <div class="movie-grid" id="watchlist-grid"></div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="app.js"></script>
</body>
</html>
