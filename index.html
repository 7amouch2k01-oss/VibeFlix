<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MosMa - Premium Movie Streaming</title>
    <style>
        :root {
            --bg-color: #050505;
            --bg-secondary: rgba(20, 20, 20, 0.7);
            --card-bg: rgba(30, 30, 30, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --accent-color: #ff0000;
            --accent-hover: #cc0000;
            --glow-color: rgba(255, 0, 0, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition-speed: 0.4s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255, 0, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 0, 0.05) 0%, transparent 40%);
            color: var(--text-primary);
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Utility */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        /* Header Styles */
        header {
            text-align: center;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #main-title {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff0000, #ff6666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.3));
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* Hero Section */
        .hero-section {
            position: relative;
            height: 70vh;
            min-height: 500px;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }

        .hero-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: transform 1s ease;
        }

        .hero-section:hover .hero-backdrop {
            transform: scale(1.05);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, var(--bg-color) 10%, transparent 70%),
                        linear-gradient(to right, var(--bg-color) 0%, transparent 50%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            padding: 60px;
            max-width: 800px;
            animation: slideUp 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.1;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .hero-rating-value {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffd700;
            font-weight: bold;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .hero-overview {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 1.1rem;
            max-width: 600px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 14px 35px;
            border-radius: 30px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        /* Controls Container */
        .controls-container {
            max-width: 1400px;
            margin: -40px auto 40px;
            padding: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
            border-radius: 20px;
        }

        .search-container {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        #movie-search {
            width: 100%;
            padding: 15px 60px 15px 25px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        /* Accessibility Focus */
        :focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 4px;
        }

        #movie-search:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }

        .search-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        /* Filter Chips */
        .genre-filter {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 20px 20px;
            max-width: 1400px;
            margin: 0 auto;
            scrollbar-width: none;
        }

        .genre-filter::-webkit-scrollbar {
            display: none;
        }

        .genre-btn {
            padding: 10px 25px;
            border-radius: 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            font-weight: 500;
        }

        .genre-btn:hover, .genre-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        /* Movie Grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 35px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Movie Card */
        .movie-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            position: relative;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .movie-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--accent-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 0, 0, 0.2);
        }

        .poster-container {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
        }

        .poster-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s;
        }

        .movie-card:hover .poster-container img {
            transform: scale(1.1);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }

        .movie-card:hover .card-overlay {
            opacity: 1;
        }

        .rating-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 15px;
            color: #ffd700;
            font-weight: bold;
            border: 1px solid rgba(255, 215, 0, 0.3);
            z-index: 5;
        }

        .watchlist-btn-card {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
            z-index: 5;
        }

        .watchlist-btn-card:hover, .watchlist-btn-card.added {
            background: var(--accent-color);
            border-color: var(--accent-color);
            transform: scale(1.1);
        }

        .movie-info {
            padding: 20px;
        }

        .movie-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            overflow-y: auto;
            padding: 40px 20px;
        }

        .modal.active {
            display: flex;
            justify-content: center;
        }

        .modal-content {
            background: #111;
            width: 100%;
            max-width: 1000px;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            position: relative;
            animation: modalIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes modalIn {
            from { transform: scale(0.9) translateY(50px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            color: white;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--accent-color);
            transform: rotate(90deg);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .hero-content { padding: 30px; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
            #main-title { font-size: 2rem; letter-spacing: 3px; }
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="main-title">MosMa</h1>
        <p class="subtitle">Premium Cinema Experience</p>
    </header>

    <main>
        <section class="hero-section" id="hero-section">
            <div class="hero-backdrop" id="hero-backdrop"></div>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h2 class="hero-title" id="hero-title">Discover Masterpieces</h2>
                <div class="hero-meta">
                    <div class="hero-rating-value">
                        <span>★</span>
                        <span id="hero-rating">9.8</span>
                    </div>
                    <span id="hero-year">2024</span>
                </div>
                <p class="hero-overview" id="hero-overview">Loading the latest cinematic wonders for your viewing pleasure...</p>
                <div class="hero-buttons">
                    <button class="btn btn-primary" id="hero-trailer-btn"><span>▶</span> Watch Trailer</button>
                    <button class="btn btn-secondary" id="hero-watchlist-btn"><span>+</span> Watchlist</button>
                </div>
            </div>
        </section>

        <div class="glass controls-container">
            <div class="search-container">
                <input type="text" id="movie-search" placeholder="Search for movies, actors, directors..." aria-label="Search movies">
                <span class="search-icon" aria-hidden="true">🔍</span>
            </div>
            
            <div class="sort-group">
                <select id="sort-select" class="genre-btn" style="background: rgba(255,255,255,0.05);">
                    <option value="popularity">Most Popular</option>
                    <option value="rating">Top Rated</option>
                    <option value="release-date">Newest</option>
                </select>
            </div>

            <button id="watchlist-btn" class="btn btn-secondary" style="padding: 10px 20px;">
                Watchlist (<span class="watchlist-count">0</span>)
            </button>
        </div>

        <div class="genre-filter" id="genre-filter">
            <button class="genre-btn active" data-genre="all">All Genres</button>
            <!-- Genres will be injected here -->
        </div>

        <div id="error-message" style="display:none; text-align:center; padding: 40px; color: var(--accent-color);"></div>

        <div class="movie-grid" id="movie-display-area">
            <!-- Movie cards will be injected here -->
        </div>

        <div id="loading-spinner" style="display:none; text-align:center; padding: 40px;">
            <div class="skeleton" style="width: 50px; height: 50px; border-radius: 50%; margin: 0 auto;"></div>
        </div>

        <div id="empty-state" style="display:none; text-align:center; padding: 100px 20px;">
            <h2>No movies found</h2>
            <p>Try adjusting your search or filters</p>
        </div>
    </main>

    <!-- Movie Detail Modal -->
    <div class="modal" id="movie-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div id="modal-details-content">
                <!-- Details injected here -->
            </div>
        </div>
    </div>

    <!-- Watchlist Container -->
    <div class="watchlist-container" id="watchlist-container" style="display:none; padding: 40px 20px; max-width: 1400px; margin: 0 auto;">
        <h2 style="margin-bottom: 30px; font-size: 2.5rem;">My Watchlist</h2>
        <div class="movie-grid" id="watchlist-grid"></div>
    </div>

    <button id="back-to-top" class="glass" style="position:fixed; bottom:30px; right:30px; width:50px; height:50px; border-radius:50%; display:none; cursor:pointer; align-items:center; justify-content:center; color:white; z-index:1000;">↑</button>

    <script src="app.js"></script>
</body>
</html>
